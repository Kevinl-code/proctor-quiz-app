<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proctored Quiz Data Science</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <style>
       /* ===== SPINNER LOGO ===== */
/* ===== APP LOADER ===== */
/* ==/* ===== SPLASH LOADER ===== */

/* ===== SPLASH LOADER ===== */
#splash {
  position: fixed;
  inset: 0;
  background: var(--bg-dark);
  z-index: 1000;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* container */
.logo-container {
  position: relative;
  width: 120px;
  height: 120px;
  margin-bottom: 30px;
}

/* spinning ring */
.spinner {
  position: absolute;
  inset: -8px;

  border: 3px solid transparent;
  border-top: 3px solid var(--accent);
  border-right: 3px solid var(--primary);

  border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* logo holder */
.logo-circle {
  width: 100%;
  height: 100%;

  background: rgba(255,255,255,0.05);
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;

  border: 1px solid var(--border);

  box-shadow: 0 0 40px rgba(99,102,241,0.2);
}

/* logo itself */
.main-logo {
  width: 300px;
  height: 200px;
  object-fit: contain;
}

/* animation */
@keyframes spin {
  100% { transform: rotate(360deg); }
}
    </style>
</head>
<body>
   <div id="splash">

    <div class="logo-container">

        <div class="spinner"></div>

        <div class="logo-circle">
            <img src="/static/images/logo.png" class="main-logo"> </div>

    </div>

    <div style="text-align:center;">
        <div style="font-weight:800;letter-spacing:2px;">
            Proctored Quiz Data Science 
        </div><br>

        <div style="color:var(--accent);font-size:13px;">
            Secure Smart Exam of BHC DS
        </div>
    </div>

</div>
    <script>
        window.addEventListener("load", () => {

    setTimeout(() => {

        const splash = document.getElementById("splash");
        splash.style.opacity = "0";

        setTimeout(()=>{
            splash.style.display="none";
            window.location.href="/login";
        },800);

    },1800);

});
        
    </script>
</body>
</html>
