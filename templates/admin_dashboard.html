<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Professor Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="icon" href="{{ url_for('static', filename='images/favicon3.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon3.png') }}">

<!-- JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>

</head>

<body>

<!-- ✅ LOGOUT (Moved to BODY) -->
<div style="position:absolute; top:20px; right:20px; z-index:1000;">
    <a href="/logout" class="btn-secondary">Logout</a>
</div>

<div class="auth-container">

<img src="/static/images/logo.png" class="page-logo">

<div class="card wide">

<h2>Professor Dashboard</h2>
<div class="sub">Manage Quiz & Monitor Students</div>

<!-- ================= ACTION BUTTONS ================= -->

<div class="admin-actions">

<button class="btn-primary" onclick="showPanel('quizPanel')">
➕ Create Quiz
</button>

<button class="btn-secondary" onclick="showPanel('activityPanel'); loadActivity();">
👨‍🎓 Student Activity
</button>

<button class="btn-secondary" onclick="showPanel('scorePanel'); loadScore();">
🏆 Score Board
</button>

</div>

<!-- ================= CREATE QUIZ ================= -->

<div id="quizPanel" class="panel">

<h3>Create Quiz</h3>

<div style="display:flex; flex-direction:column; gap:10px; margin-top:10px">

<input id="quizTitle" placeholder="Quiz Title">

<div style="display:flex; gap:10px">
<input id="quizStart" type="datetime-local" style="flex:1">
<input id="quizDuration" placeholder="Duration (minutes)" style="flex:1">
</div>

</div>

<!-- MODE SWITCH -->
<div style="margin-top:15px; display:flex; gap:10px">

<button class="btn-secondary" onclick="manualMode()">✍ Manual Questions</button>

<button class="btn-secondary" onclick="uploadMode()">📂 Upload File</button>

</div>

<!-- MANUAL AREA -->
<div id="manualQuestions" style="margin-top:10px"></div>

<!-- UPLOAD AREA -->
<div id="uploadArea" style="display:none; margin-top:15px">

<input type="file" id="fileUpload" accept=".csv,.txt,.docx,.pdf">

<div id="fileName" style="font-size:13px; color:#94a3b8; margin-top:5px;">
No file selected
</div>

<button class="btn-secondary" style="margin-top:8px;" onclick="uploadQuestions()">
⬆ Upload Questions
</button>

</div>

<!-- CREATE BUTTON -->
<button class="btn-primary" style="margin-top:18px" onclick="createQuiz()">
🚀 Create Quiz
</button>

<!-- ================= QR SECTION ================= -->
<div id="qrSection" style="display:none; margin-top:25px; text-align:center;">

    <div id="qrCard" style="
        width:280px;
        margin:auto;
        padding:20px;
        border-radius:25px;
        background: linear-gradient(135deg,#667eea,#764ba2);
        color:white;
        box-shadow:0 12px 30px rgba(0,0,0,0.25);
    ">

        <p style="font-size:12px; opacity:0.8;">
            Quiz ID: <span id="qrId"></span>
        </p>

        <h3 id="qrTitle" style="margin:5px 0;"></h3>

        <p id="qrDetails" style="font-size:13px;"></p>

       <div style="
    padding:15px;
    background:white;
    border-radius:50%;
    width:240px;
    height:240px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
">

    <div id="qrCanvas"></div>

</div>

        <p style="font-size:12px; margin-top:10px;">
            📱 Scan to Join Quiz
        </p>

    </div>

    <div style="margin-top:12px;">
        <button class="btn-secondary" onclick="downloadQR()">⬇ Save PNG</button>
        <button class="btn-secondary" onclick="resetQuiz()">🔄 Reset</button>
    </div>

</div>
</div>

<!-- ================= STUDENT ACTIVITY ================= -->

<div id="activityPanel" class="panel">

<h3>Student Activity</h3>

<table id="activityTable">

<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Answered</th>
<th>Correct</th>
<th>Wrong</th>
<th>Skipped</th>
<th>Violation</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- ================= SCOREBOARD ================= -->

<div id="scorePanel" class="panel">

<h3>Score Board</h3>

<table id="scoreTable">

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>ID</th>
<th>Correct</th>
<th>Wrong</th>
<th>Result</th>
<th>Badge</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>
</div>

<!-- LIBRARIES (Placed at END for stability) -->
<script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

</body>
</html>
