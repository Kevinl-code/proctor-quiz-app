<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" sizes="32x32">
<link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" sizes="192x192">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}">
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

 
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="apple-touch-icon" sizes="152x152" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="apple-touch-icon" sizes="167x167" href="{{ url_for('static', filename='images/logo.png') }}">

    <!-- Android / Chrome Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    </head>
    
</head>
<body>
    <div id="splash">

    <div class="logo-container">

        <div class="spinner"></div>

        <div class="logo-circle">
            <img src="/static/images/logo.png" class="main-logo">
        </div>

    </div>
</div>
        <div class="auth-container">
    <img src="/static/images/logo.png" class="page-logo">
    <h2>PQDS</h2>
    <div class="sub">Login to continue</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div id="msg">
                {% for category, message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <p id="role-hint" style="font-size:12px;color:#94a3b8;margin-bottom:8px;"></p>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn-primary" type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top:12px;">Don't have an account? 
        <a href="/signup" style="color: var(--accent);">Create Account</a>
    </p>
</div>
</body>
</html>
